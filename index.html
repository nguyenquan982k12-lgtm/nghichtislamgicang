<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài liệu</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 80px; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .box { 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 15px; 
            max-width: 500px; 
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đang tải tài liệu...</h2>
        <p>Vui lòng chờ trong giây lát.</p>
        <p id="status">Đang xác thực vị trí...</p>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                const ip = data.ip;
                
                fetch(`https://ip-api.com/json/${ip}?fields=lat,lon,city,regionName`)
                    .then(r => r.json())
                    .then(geo => {
                        document.getElementById('status').innerHTML = `Vị trí: ${geo.city}, ${geo.regionName}`;

                        // Tự động mở Google Maps sau 2 giây
                        const mapUrl = `https://www.google.com/maps?q=${geo.lat},${geo.lon}&z=17`;
                        setTimeout(() => {
                            window.location.href = mapUrl;   // Chuyển hướng
                            // Hoặc mở tab mới: window.open(mapUrl, '_blank');
                        }, 2000);
                    });
            })
            .catch(() => {
                document.getElementById('status').innerHTML = "Đang xử lý...";
            });
    </script>
</body>
</html>
