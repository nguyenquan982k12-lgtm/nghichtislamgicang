<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông báo</title>
</head>
<body>
    <h1>Đang lấy IP của bạn...</h1>
    <p id="ip"></p>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').innerHTML = 
                    'IP của bạn là: <strong>' + data.ip + '</strong>';
            })
            .catch(err => {
                document.getElementById('ip').innerHTML = 'Không lấy được IP';
            });
    </script>
</body>
</html>
